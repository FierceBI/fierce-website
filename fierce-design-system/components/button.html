<!--
    Fierce Design System — Button Component
    Extracted from fierce-sdr-tool/

    States documented:
    - Default (rest)
    - Hover
    - Active
    - Disabled

    Sizes found in source:
    - Standard (14px 28px) — navigation CTAs
    - Large (16px 32px) — confirmation CTAs
    - Extra Large (18px 40px) — hero CTAs
    - Submit (18px 48px) — form submits
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Component — Fierce Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-accent: #eb7525;
            --color-accent-hover: #d4691f;
            --color-muted: #888888;
            --font-sans: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            padding: 40px;
            background: #f5f5f5;
        }

        .component-section {
            margin-bottom: 48px;
        }

        .component-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 16px;
        }

        .component-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ==========================================================================
           PRIMARY BUTTON
           ========================================================================== */

        .btn {
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--color-accent);
            color: #ffffff;
        }

        /* Hover state */
        .btn-primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
        }

        /* Active state */
        .btn-primary:active {
            transform: translateY(0);
        }

        /* Disabled state */
        .btn-primary:disabled {
            background: var(--color-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* ==========================================================================
           SIZE VARIANTS
           ========================================================================== */

        .btn-sm {
            padding: 12px 20px;
            font-size: 14px;
        }

        .btn-md {
            padding: 14px 28px;
            font-size: 15px;
        }

        .btn-lg {
            padding: 16px 32px;
            font-size: 15px;
        }

        .btn-xl {
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-submit {
            padding: 18px 48px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 400px;
        }

        /* ==========================================================================
           SECONDARY BUTTON (outline style)
           Found in: public/index.html (logout button)
           ========================================================================== */

        .btn-secondary {
            padding: 8px 16px;
            font-size: 14px;
            color: #52525b;
            background: none;
            border: 1px solid #d4d4d8;
            border-radius: 6px;
        }

        .btn-secondary:hover {
            background: #f4f4f5;
        }
    </style>
</head>
<body>
    <div class="component-section">
        <div class="component-label">Primary Button — States</div>
        <div class="component-row">
            <button class="btn btn-primary">Default</button>
            <button class="btn btn-primary" style="background: var(--color-accent-hover);">Hover</button>
            <button class="btn btn-primary" disabled>Disabled</button>
        </div>
    </div>

    <div class="component-section">
        <div class="component-label">Primary Button — Sizes</div>
        <div class="component-row">
            <button class="btn btn-primary btn-sm">Small</button>
            <button class="btn btn-primary btn-md">Medium</button>
            <button class="btn btn-primary btn-lg">Large</button>
            <button class="btn btn-primary btn-xl">Extra Large</button>
        </div>
    </div>

    <div class="component-section">
        <div class="component-label">Submit Button (Full Width)</div>
        <div class="component-row">
            <button class="btn btn-primary btn-submit">Reserve my seat</button>
        </div>
    </div>

    <div class="component-section">
        <div class="component-label">Secondary Button (Outline)</div>
        <div class="component-row">
            <button class="btn btn-secondary">Sign Out</button>
        </div>
    </div>

    <div class="component-section">
        <div class="component-label">Button as Link</div>
        <div class="component-row">
            <a href="#" class="btn btn-primary">Reserve your seat</a>
        </div>
    </div>
</body>
</html>
