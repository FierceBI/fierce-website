<!--
    Fierce Design System — Navigation Component
    Extracted from fierce-sdr-tool/

    Pattern: Fixed top navigation with logo and CTA

    States documented:
    - Default (at top of page)
    - Scrolled (with shadow)

    Variants found:
    - With CTA button (landing pages)
    - Centered logo only (thank-you pages)
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Component — Fierce Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #ffffff;
            --color-text: #0e0e0e;
            --color-accent: #eb7525;
            --color-accent-hover: #d4691f;
            --border-light: rgba(14, 14, 14, 0.06);
            --shadow-nav: 0 1px 20px rgba(0, 0, 0, 0.04);
            --font-serif: 'DM Serif Display', serif;
            --font-sans: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            min-height: 200vh; /* For scroll demo */
            background: #f5f5f5;
        }

        .demo-section {
            padding: 100px 40px 40px;
        }

        .component-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 16px;
        }

        /* ==========================================================================
           NAVIGATION — STANDARD (with CTA)
           ========================================================================== */

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--color-bg);
            border-bottom: 1px solid var(--border-light);
            transition: box-shadow 0.3s ease;
        }

        /* Scrolled state — add via JavaScript on scroll */
        .nav.scrolled {
            box-shadow: var(--shadow-nav);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 24px;
            color: var(--color-text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo:hover {
            color: var(--color-accent);
        }

        .btn {
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--color-accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
        }

        /* ==========================================================================
           NAVIGATION — CENTERED (thank-you pages)
           ========================================================================== */

        .nav-centered .nav-inner {
            justify-content: center;
        }

        /* ==========================================================================
           RESPONSIVE (mobile)
           ========================================================================== */

        @media (max-width: 680px) {
            .nav-inner {
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Standard Navigation with CTA -->
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="#" class="logo">Fierce</a>
            <a href="#rsvp" class="btn btn-primary">Reserve your seat</a>
        </div>
    </nav>

    <div class="demo-section">
        <div class="component-label">Standard Navigation (scroll to see shadow)</div>
        <p>The navigation above demonstrates the standard pattern with logo and CTA button.</p>
        <p style="margin-top: 16px;">Scroll down to see the shadow appear on the nav.</p>

        <div style="margin-top: 48px;">
            <div class="component-label">Centered Navigation Variant</div>
            <p>Used on thank-you pages where no CTA is needed.</p>
            <div style="margin-top: 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px;">
                <div style="padding: 20px 40px; display: flex; justify-content: center;">
                    <a href="#" class="logo">Fierce</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Add scroll shadow effect
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
